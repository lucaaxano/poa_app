<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POA - Verbindung wird hergestellt...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f8f9fa;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      margin: 0 auto 1.5rem;
      border: 4px solid #e8eaf0;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 0.5rem;
    }

    .status {
      font-size: 0.875rem;
      color: #9ca3af;
      margin-bottom: 2rem;
    }

    button {
      background-color: #1a1a2e;
      color: #ffffff;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #2a2a4e;
    }

    button:active {
      background-color: #0f0f1e;
    }

    .brand {
      margin-top: 3rem;
      font-size: 0.875rem;
      color: #9ca3af;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Verbindung wird hergestellt...</h1>
    <p>
      Der Server wird gerade neu gestartet.
      Die Seite wird automatisch neu geladen.
    </p>
    <p class="status" id="status">Warte auf Server...</p>
    <button onclick="window.location.reload()">Jetzt neu laden</button>
    <div class="brand">POA - Point of Accident</div>
  </div>
  <script>
    var attempt = 0;
    var statusEl = document.getElementById('status');

    setInterval(function() {
      attempt++;
      statusEl.textContent = 'Versuch ' + attempt + '...';

      fetch(window.location.href, { method: 'HEAD' })
        .then(function(r) {
          if (r.ok) {
            statusEl.textContent = 'Verbindung hergestellt! Lade neu...';
            window.location.reload();
          }
        })
        .catch(function() {
          // Still offline, keep trying
        });
    }, 5000);
  </script>
</body>
</html>
